flows:
  # ════════════════════════════════════════════════════════════════
  # 3-TIER WEB APPLICATION (DMZ → IIS → DotNet → MSSQL/Redis)
  # ════════════════════════════════════════════════════════════════
  # DMZ Web → IIS (HTTPS inbound)
  - name: dmz-web01-to-iis01-https
    source: DAL-WEB-01
    source_port: 42001
    destination: DAL-IIS-01
    destination_port: 443
    protocol: TCP
    rate: 120Mbps
